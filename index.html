<!DOCTYPE html>
<html lang="pl">
<head>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<meta charset="UTF-8">
<title>start</title>

<!-- font w stylu Windows 7 -->
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #7fffd4, #00bcd4);
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
}

/* ekran wejścia */
#start{
    text-align:center;
    color:white;
    padding:40px;
    border:2px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.2);
    border-radius:10px;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:5px;
}

/* video fullscreen */
#videoContainer{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>

</head>
<body>

<div id="start">
    <h2>Witaj</h2>
    <p>Kliknij „Wejdź”</p>
    <button onclick="enter()">Wejdź</button>
</div>

<div id="videoContainer">
    <video id="video" loop>
        <source src="video.mp4" type="video/mp4">
    </video>
</div>

<script>
function enter(){
    document.getElementById("start").style.display = "none";
    document.getElementById("videoContainer").style.display = "block";

    const video = document.getElementById("video");

    video.play().catch(err => {
        console.log("Autoplay zablokowany:", err);
    });
}
</script>

</body>
</html>
