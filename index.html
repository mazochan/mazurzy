<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>mazurzy.pl</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
    color:black;
    font-family:Arial;
    filter: invert(1);
}

#popup, #loading{
    text-align:center;
    padding:30px;
    border:1px solid black;
    background:white;
}

#loading{
    display:none;
    font-size:20px;
}
</style>

</head>
<body>

<div id="popup">
    <h2>Witaj!</h2>
    <p>Kliknij, aby wejść na stronę</p>
    <button onclick="start()">Wejdź</button>
</div>

<div id="loading">Praca w toku.</div>

<audio id="muzyka" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let dots = 0;
let interval;

function start(){
    document.getElementById("popup").style.display = "none";
    document.getElementById("loading").style.display = "block";

    document.getElementById("muzyka").play();

    interval = setInterval(() => {
        dots = (dots + 1) % 4;
        document.getElementById("loading").innerText =
            "Praca w toku" + ".".repeat(dots);
    }, 500);
}
</script>

</body>
</html>
