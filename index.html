<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>mazurzy.pl</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

video{
    width:100vw;
    height:100vh;
    object-fit:cover;
}

/* ikona dźwięku */
#soundBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:50px;
    height:50px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    cursor:pointer;
    user-select:none;
    backdrop-filter: blur(5px);
}
</style>

</head>
<body>

<video id="film" autoplay muted loop>
    <source src="video.mp4" type="video/mp4">
</video>

<div id="soundBtn">🔊</div>

<script>
const video = document.getElementById("film");
const btn = document.getElementById("soundBtn");

btn.addEventListener("click", () => {
    video.muted = !video.muted;

    if(video.muted){
        btn.innerText = "🔊";
    } else {
        btn.innerText = "🔇";
    }
});
</script>

</body>
</html>
